// Avatar
class CpAvatar extends LitElement {
  static properties={name:{},size:{type:Number}};
  static styles=css`:host{display:inline-block}.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;color:white;flex-shrink:0}`;
  get initials(){return(this.name||'U').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase()}
  get bg(){const c=['#0d2d5e','#1e6bdc','#0ea5aa','#7c3aed','#db2777'];let h=0;for(const ch of(this.name||''))h=(h*31+ch.charCodeAt(0))%c.length;return c[h]}
  render(){const s=this.size||40,fs=Math.round(s*.36);return html`<div class="av" style="width:${s}px;height:${s}px;font-size:${fs}px;background:${this.bg}">${this.initials}</div>`}
}
customElements.define('cp-avatar',CpAvatar);

// Progress Ring
class CpProgressRing extends LitElement {
  static properties={value:{type:Number},size:{type:Number},color:{}};
  static styles=css`:host{display:inline-block}.wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}.lbl{position:absolute;font-family:var(--font-display);font-weight:800;color:var(--primary);text-align:center;line-height:1}`;
  render(){const s=this.size||80,r=s/2-6,c=2*Math.PI*r,fill=c-(c*(this.value||0)/100),fs=Math.round(s*.22);return html`<div class="wrap" style="width:${s}px;height:${s}px"><svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}" style="transform:rotate(-90deg)"><circle cx="${s/2}" cy="${s/2}" r="${r}" fill="none" stroke="#e2e8f0" stroke-width="8"/><circle cx="${s/2}" cy="${s/2}" r="${r}" fill="none" stroke="${this.color||'var(--primary)'}" stroke-width="8" stroke-dasharray="${c}" stroke-dashoffset="${fill}" stroke-linecap="round"/></svg><div class="lbl" style="font-size:${fs}px">${this.value}%</div></div>`}
}
customElements.define('cp-progress-ring',CpProgressRing);

// Toggle
class CpToggle extends LitElement {
  static properties={checked:{type:Boolean}};
  static styles=css`:host{display:inline-block;cursor:pointer}.t{width:44px;height:24px;border-radius:12px;background:var(--border);position:relative;transition:background var(--transition)}.t.on{background:var(--accent)}.th{width:18px;height:18px;border-radius:50%;background:white;position:absolute;top:3px;left:3px;transition:transform var(--transition);box-shadow:0 1px 4px rgba(0,0,0,.15)}.t.on .th{transform:translateX(20px)}`;
  _t(){this.checked=!this.checked;this.dispatchEvent(new CustomEvent('change',{detail:this.checked}))}
  render(){return html`<div class="t ${this.checked?'on':''}" @click=${this._t}><div class="th"></div></div>`}
}
customElements.define('cp-toggle',CpToggle);

// ════════════════════════════════════════════════════════════
// SIDEBAR NAV
// ════════════════════════════════════════════════════════════
const NAV={alumni:[{id:'passport',icon:'🪪',label:'Career Passport'},{id:'job-search',icon:'🔍',label:'Job Search'},{id:'digital-vault',icon:'🔒',label:'Digital Vault'},{id:'instant-apply',icon:'⚡',label:'Instant Apply'},{id:'app-tracker',icon:'📊',label:'Applications'}],employer:[{id:'employer-dashboard',icon:'📋',label:'Dashboard'},{id:'post-job',icon:'📝',label:'Post a Job'},{id:'applicant-screening',icon:'👥',label:'Applicants'}],staff:[{id:'admin-analytics',icon:'📈',label:'Analytics'},{id:'applicant-screening',icon:'👥',label:'Screening'}]};

class SidebarNav extends LitElement {
  static properties={role:{},activeView:{},open:{type:Boolean}};
  static styles=css`
    :host{display:block}
    nav{width:var(--nav-width);min-height:100vh;background:var(--primary-dark);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;transition:transform var(--transition);flex-shrink:0}
    .logo-area{padding:28px 20px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
    .logo{font-family:var(--font-display);font-weight:800;color:white;font-size:18px;letter-spacing:-.02em}
    .logo-sub{font-size:10px;color:rgba(255,255,255,.4);font-weight:500;letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
    .role-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border-radius:100px;padding:4px 12px;margin-top:14px;font-size:11px;color:rgba(255,255,255,.7);font-weight:600;text-transform:capitalize}
    .rdot{width:6px;height:6px;border-radius:50%;background:#10b981}
    .nav-section{padding:16px 12px;flex:1}
    .nav-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;color:rgba(255,255,255,.3);text-transform:uppercase;padding:0 8px;margin-bottom:8px;margin-top:8px}
    .nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--radius-md);color:rgba(255,255,255,.6);font-size:14px;font-weight:500;cursor:pointer;transition:all var(--transition);margin-bottom:2px;user-select:none}
    .nav-item:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.9)}
    .nav-item.active{background:rgba(255,255,255,.12);color:white;font-weight:600}
    .nav-item.active::before{content:'';width:3px;height:20px;background:var(--accent-light);border-radius:2px;margin-right:-2px;margin-left:-6px}
    .nav-icon{font-size:18px;width:22px;text-align:center;flex-shrink:0}
    .bottom-area{padding:16px 12px;border-top:1px solid rgba(255,255,255,.08)}
    .user-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-md);background:rgba(255,255,255,.06)}
    .uname{font-size:13px;font-weight:600;color:white}
    .usub{font-size:11px;color:rgba(255,255,255,.45)}
    @media(max-width:768px){nav{position:fixed;left:0;top:0;z-index:50;transform:translateX(-100%)}nav.open{transform:translateX(0);box-shadow:var(--shadow-lg)}}
  `;
  _nav(id){this.dispatchEvent(new CustomEvent('navigate',{detail:{view:id},bubbles:true,composed:true}))}
  render(){
    const items=NAV[this.role]||NAV.alumni;
    const uname=this.role==='alumni'?'Alex Johnson':this.role==='employer'?'TechFlow Inc.':'Admin Staff';
    return html`<nav class="${this.open?'open':''}">
      <div class="logo-area"><div class="logo">Career Passport</div><div class="logo-sub">Blue Knight Network</div><div class="role-badge"><span class="rdot"></span>${this.role||'alumni'}</div></div>
      <div class="nav-section"><div class="nav-lbl">Navigation</div>${items.map(i=>html`<div class="nav-item ${this.activeView===i.id?'active':''}" @click=${()=>this._nav(i.id)}><span class="nav-icon">${i.icon}</span>${i.label}</div>`)}</div>
      <div class="bottom-area"><div class="user-card"><cp-avatar name="${uname}" size="32"></cp-avatar><div><div class="uname">${uname}</div><div class="usub">${this.role||'alumni'} account</div></div></div></div>
    </nav>`;
  }
}
customElements.define('sidebar-nav',SidebarNav);

// ════════════════════════════════════════════════════════════
// VIEW: LOGIN
// ════════════════════════════════════════════════════════════
class ViewLogin extends LitElement {
  static properties={tab:{},email:{},pw:{},showPw:{type:Boolean},loading:{type:Boolean},err:{}};
  constructor(){super();this.tab='alumni';this.email='';this.pw='';this.showPw=false;this.loading=false;this.err=''}
  static styles=css`
    :host{display:block;min-height:100vh}
    .page{min-height:100vh;display:flex;background:linear-gradient(135deg,#0d1b2e 0%,#1a3a6b 50%,#0d2d5e 100%)}
    .hero{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:60px;position:relative;overflow:hidden}
    .hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23fff' fill-opacity='.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E")}
    .hc{position:relative;z-index:1}
    .htitle{font-family:var(--font-display);font-size:52px;font-weight:800;color:white;line-height:1.05;letter-spacing:-.03em;margin-bottom:16px}
    .htitle span{color:#60a5fa}
    .hdesc{font-size:16px;color:rgba(255,255,255,.6);max-width:380px;line-height:1.6}
    .hstats{display:flex;gap:40px;margin-top:40px}
    .hstat .num{font-family:var(--font-display);font-size:32px;font-weight:800;color:white;line-height:1}
    .hstat .lbl{font-size:12px;color:rgba(255,255,255,.45);margin-top:4px}
    .form-panel{width:480px;background:white;display:flex;flex-direction:column;justify-content:center;padding:60px 52px;position:relative}
    .flogo{font-family:var(--font-display);font-weight:800;font-size:20px;color:var(--primary);letter-spacing:-.02em;margin-bottom:8px}
    .fgreet{font-size:28px;font-weight:700;color:var(--text-primary);font-family:var(--font-display);margin-bottom:6px}
    .fsub{font-size:14px;color:var(--text-secondary);margin-bottom:32px}
    .tabs{display:flex;background:var(--bg-subtle);border-radius:var(--radius-md);padding:4px;margin-bottom:28px}
    .tab{flex:1;padding:9px;text-align:center;cursor:pointer;font-size:13px;font-weight:600;border-radius:8px;color:var(--text-secondary);transition:all var(--transition)}
    .tab.active{background:var(--primary);color:white;box-shadow:0 2px 8px rgba(13,45,94,.25)}
    .field{margin-bottom:18px}
    label{display:block;font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:7px}
    .iw{position:relative}
    .iicon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--text-muted)}
    input{width:100%;padding:12px 14px 12px 42px;border:1.5px solid var(--border);border-radius:var(--radius-md);font-family:var(--font-body);font-size:14px;color:var(--text-primary);background:white;outline:none;transition:border-color var(--transition);box-sizing:border-box}
    input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(30,107,220,.1)}
    .eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:16px;padding:2px}
    .forgot{text-align:right;margin-top:-10px;margin-bottom:20px}
    .forgot a{font-size:13px;color:var(--accent);text-decoration:none;font-weight:500;cursor:pointer}
    .err{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;margin-bottom:16px}
    .signin{width:100%;padding:14px;background:var(--primary);color:white;border:none;border-radius:var(--radius-md);font-family:var(--font-body);font-size:15px;font-weight:700;cursor:pointer;transition:all var(--transition);display:flex;align-items:center;justify-content:center;gap:8px}
    .signin:hover{background:var(--primary-dark);transform:translateY(-1px);box-shadow:0 4px 16px rgba(13,45,94,.3)}
    .divider{display:flex;align-items:center;gap:14px;margin:20px 0;font-size:12px;color:var(--text-muted);font-weight:500}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .sbtn{width:100%;padding:11px 14px;background:white;border:1.5px solid var(--border);border-radius:var(--radius-md);font-family:var(--font-body);font-size:14px;font-weight:500;cursor:pointer;transition:all var(--transition);display:flex;align-items:center;justify-content:center;gap:10px;color:var(--text-primary);margin-bottom:10px}
    .sbtn:hover{background:var(--bg-subtle);border-color:var(--accent)}
    .glogo{font-weight:800;font-size:15px;background:linear-gradient(90deg,#4285F4,#EA4335,#FBBC05,#34A853);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .signup{text-align:center;margin-top:24px;font-size:13px;color:var(--text-secondary)}
    .signup a{color:var(--accent);font-weight:700;text-decoration:none;cursor:pointer}
    @media(max-width:900px){.hero{display:none}.form-panel{width:100%;padding:40px 28px}}
  `;
  _signIn(){
    if(!this.email||!this.pw){this.err='Please enter your email/ID and password.';return}
    this.loading=true;this.err='';
    setTimeout(()=>{this.loading=false;this.dispatchEvent(new CustomEvent('login',{detail:{role:this.tab},bubbles:true,composed:true}))},800);
  }
  _kd(e){if(e.key==='Enter')this._signIn()}
  render(){return html`
    <div class="page">
      <div class="hero">
        <div class="hc">
          <div class="htitle">Your career,<br><span>verified.</span></div>
          <p class="hdesc">Connect your verified academic credentials with exclusive alumni opportunities on the Blue Knight Career Passport.</p>
          <div class="hstats">
            <div class="hstat"><div class="num">15K+</div><div class="lbl">Alumni Network</div></div>
            <div class="hstat"><div class="num">94%</div><div class="lbl">Employment Rate</div></div>
            <div class="hstat"><div class="num">$85k</div><div class="lbl">Avg. Package</div></div>
          </div>
        </div>
      </div>
      <div class="form-panel">
        <div class="flogo">Career Passport</div>
        <div class="fgreet">Welcome Back</div>
        <p class="fsub">Access your professional network and career tools.</p>
        <div class="tabs">${['alumni','employer','staff'].map(r=>html`<div class="tab ${this.tab===r?'active':''}" @click=${()=>{this.tab=r;this.err=''}}>${r.charAt(0).toUpperCase()+r.slice(1)}</div>`)}</div>
        ${this.err?html`<div class="err">${this.err}</div>`:''}
        <div class="field"><label>Email or ID</label><div class="iw"><span class="iicon">✉️</span><input type="text" placeholder="Enter your email or ID" .value=${this.email} @input=${e=>this.email=e.target.value} @keydown=${this._kd}/></div></div>
        <div class="field"><label>Password</label><div class="iw"><span class="iicon">🔒</span><input type="${this.showPw?'text':'password'}" placeholder="••••••••" .value=${this.pw} @input=${e=>this.pw=e.target.value} @keydown=${this._kd}/><button class="eye" @click=${()=>this.showPw=!this.showPw}>${this.showPw?'🙈':'👁️'}</button></div></div>
        <div class="forgot"><a>Forgot Password?</a></div>
        <button class="signin" @click=${this._signIn}>${this.loading?'⏳ Signing In...':'Sign In →'}</button>
        <div class="divider">OR CONTINUE WITH</div>
        <button class="sbtn"><span class="glogo">G</span> Sign in with Google</button>
        <button class="sbtn">⊞ Single Sign-On (SSO)</button>
        <p class="signup">New to Career Passport? <a>Request Access</a></p>
      </div>
    </div>`}
}
customElements.define('view-login',ViewLogin);

  _nav(v){this.dispatchEvent(new CustomEvent('navigate',{detail:{view:v},bubbles:true,composed:true}))}

  _s1(){const f=this.form;return html`

    <div class="field"><label>Location Preference</label>
      <div class="lgrid">${['onsite','remote','hybrid'].map(l=>html`<button class="lbtn ${f.location===l?'a':''}" @click=${()=>this.form={...f,location:l}}><span style="font-size:22px">${l==='onsite'?'🏢':l==='remote'?'☁️':'🔄'}</span>${l.charAt(0).toUpperCase()+l.slice(1)}</button>`)}</div>

    <div class="topt"><div class="tico">🎓</div><div style="flex:1"><div class="ttit">Alumni Exclusive</div><div class="tsub">Only show this role to verified alumni</div></div><cp-toggle .checked=${f.alumniExclusive} @change=${e=>this.form={...f,alumniExclusive:e.detail}}></cp-toggle></div>`}
  _s2(){const f=this.form;return html`
    <div class="stit">Job Description</div>
    <p class="ssub">Step 2 of 4: Describe the role in detail to attract the best candidates.</p>
    <div class="field"><label>Description</label><textarea placeholder="Describe the role..." .value=${f.description} @input=${e=>this.form={...f,description:e.target.value}}></textarea></div>
    <div class="field"><label>Required Degree</label><select @change=${e=>this.form={...f,requiredDegree:e.target.value}}><option>Select degree</option><option>Bachelor's</option><option>Master's</option><option>PhD</option></select></div>
    <div class="field"><label>Required Skills</label><input type="text" placeholder="e.g. React, Figma, Product Strategy"/></div>`}
  _s3(){const f=this.form;return html`
    <div class="stit">Compensation</div>
    <p class="ssub">Step 3 of 4: Set your budget and posting timeline.</p>
    <div class="field"><label>Salary Range (Annual USD)</label><div class="srow"><input type="number" placeholder="Min (e.g. 80000)" .value=${f.salaryMin} @input=${e=>this.form={...f,salaryMin:e.target.value}}/><input type="number" placeholder="Max (e.g. 120000)" .value=${f.salaryMax} @input=${e=>this.form={...f,salaryMax:e.target.value}}/></div></div>
    <div class="field"><label>Application Deadline</label><input type="date"/></div>`}
  _s4(){const f=this.form;return html`
    <div class="stit">Review &amp; Submit</div>
    <p class="ssub">Step 4 of 4: Review your post before submitting for approval.</p>
    <div style="background:var(--bg-subtle);border-radius:var(--radius-lg);padding:20px">
      <div style="font-family:var(--font-display);font-size:18px;font-weight:800;margin-bottom:12px">${f.jobTitle||'Untitled Position'}</div>
      <div style="display:flex;flex-wrap:wrap;gap:10px;font-size:13px;color:var(--text-secondary)">
        <span>💼 ${f.employmentType||'—'}</span><span>📍 ${f.location}</span>
        <span>💰 ${f.salaryMin?`$${f.salaryMin}–$${f.salaryMax}`:'Not specified'}</span>
        ${f.alumniExclusive?html`<span style="color:var(--accent)">🎓 Alumni Exclusive</span>`:''}
      </div>
      ${f.description?html`<p style="margin-top:14px;font-size:13px;color:var(--text-secondary);line-height:1.6">${f.description.slice(0,200)}</p>`:''}
    </div>
    <div style="margin-top:16px;padding:16px;background:#fff7ed;border-radius:var(--radius-md);border:1px solid #fed7aa;font-size:13px;color:#92400e">⏳ This job post will be reviewed by our admin team before going live. Usually within 24 hours.</div>`}
  _label(){return['','Description →','Compensation →','Review →',''][this.step]}
  render(){return html`

      <div class="crow"><button class="cbtn" @click=${()=>this._nav('employer-dashboard')}>✕</button><span class="plbl">Post a Career Opportunity</span><div style="width:22px"></div></div>

}
customElements.define('view-post-job',ViewPostJob);

      <div class="bi"><span class="bicon">👥</span><span class="blbl">Students</span></div>
      <div class="bi"><span class="bicon">⚙️</span><span class="blbl">Settings</span></div>
    </nav>`}
}
customElements.define('view-admin-analytics',ViewAdminAnalytics);

// ════════════════════════════════════════════════════════════
// APP SHELL — Root layout controller
// ════════════════════════════════════════════════════════════
class AppShell extends LitElement {
  static properties={view:{},role:{},loggedIn:{type:Boolean},sidebarOpen:{type:Boolean}};
  constructor(){super();this.view='login';this.role='alumni';this.loggedIn=false;this.sidebarOpen=false}
  static styles=css`
    :host{display:block}
    .layout{display:flex;min-height:100vh}
    .ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40}
    .ov.open{display:block}
    main{flex:1;overflow-y:auto;min-height:100vh;background:var(--bg)}
    .mtop{display:none;position:sticky;top:0;z-index:30;background:var(--primary);padding:12px 18px;align-items:center;justify-content:space-between}
    .mlogo{font-family:var(--font-display);font-weight:800;color:white;font-size:17px;letter-spacing:-.02em}
    .ham{background:none;border:none;cursor:pointer;color:white;font-size:22px;padding:4px;display:flex}
    @media(max-width:768px){.mtop{display:flex}}
  `;
  _login(e){this.loggedIn=true;this.role=e.detail.role;this.view=this.role==='alumni'?'passport':this.role==='employer'?'employer-dashboard':'admin-analytics'}
  _nav(e){this.view=e.detail.view;this.sidebarOpen=false}
  _view(){
    if(!this.loggedIn)return html`<view-login @login=${this._login}></view-login>`;
    switch(this.view){
      case'passport':return html`<view-passport @navigate=${this._nav}></view-passport>`;
      case'job-search':return html`<view-job-search @navigate=${this._nav}></view-job-search>`;
      case'job-detail':return html`<view-job-detail @navigate=${this._nav}></view-job-detail>`;
      case'digital-vault':return html`<view-digital-vault></view-digital-vault>`;
      case'instant-apply':return html`<view-instant-apply @navigate=${this._nav}></view-instant-apply>`;
      case'app-tracker':return html`<view-app-tracker></view-app-tracker>`;
      case'employer-dashboard':return html`<view-employer-dashboard @navigate=${this._nav}></view-employer-dashboard>`;
      case'post-job':return html`<view-post-job @navigate=${this._nav}></view-post-job>`;
      case'applicant-screening':return html`<view-applicant-screening></view-applicant-screening>`;
      case'admin-analytics':return html`<view-admin-analytics></view-admin-analytics>`;
      default:return html`<view-passport @navigate=${this._nav}></view-passport>`;
    }
  }
  render(){
    if(!this.loggedIn)return html`<view-login @login=${this._login}></view-login>`;
    return html`
      <div class="layout">
        <div class="ov ${this.sidebarOpen?'open':''}" @click=${()=>this.sidebarOpen=false}></div>
        <sidebar-nav .role=${this.role} .activeView=${this.view} .open=${this.sidebarOpen} @navigate=${this._nav}></sidebar-nav>
        <main>
          <div class="mtop">
            <span class="mlogo">Career Passport</span>
            <button class="ham" @click=${()=>this.sidebarOpen=!this.sidebarOpen}>☰</button>
          </div>
          ${this._view()}
        </main>
      </div>`;
  }
}
customElements.define('app-shell',AppShell);

// Root
class CareerPassportApp extends LitElement {
  static styles=css`:host{display:block;min-height:100vh}`;
  render(){return html`<app-shell></app-shell>`}
}
customElements.define('career-passport-app',CareerPassportApp);
</script>
